# Playwright's Chromium needs real system shared libraries to run headless
# on a Debian-based container (Railway's Nixpacks build target) — without
# these, `chromium.launch()` fails at runtime with missing .so errors, not
# a clear "install this" message. This list matches Playwright's own
# documented Debian/Ubuntu dependency set for Chromium.
# ffmpeg itself is NOT listed here — ffmpeg-static bundles its own binary
# as an npm dependency, no system package needed for that half.
[phases.setup]
aptPkgs = [
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libdbus-1-3",
  "libxcb1",
  "libxkbcommon0",
  "libx11-6",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2",
]

[phases.install]
cmds = ["npm ci", "npx playwright install chromium"]
